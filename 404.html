<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Alpha Lansing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>A</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0D1B3E 0%, #0a1230 50%, #060d20 100%);
      color: #fff;
      padding: 24px;
      text-align: center;
    }
    .container { max-width: 500px; }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 1.25rem;
      color: #fff;
      text-decoration: none;
      margin-bottom: 48px;
    }
    .logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: #0000EF;
      color: #fff;
      border-radius: 8px;
      font-family: 'Sora', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
    }
    h1 {
      font-family: 'Sora', sans-serif;
      font-size: 6rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #4D7FFF, #00C2FF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    h2 {
      font-family: 'Sora', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p {
      color: rgba(255, 255, 255, 0.65);
      line-height: 1.7;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: #0000EF;
      color: #fff;
      padding: 14px 36px;
      border-radius: 100px;
      font-family: 'Sora', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      transition: 0.3s ease;
    }
    .btn:hover {
      background: #3B3BFF;
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(0, 0, 239, 0.5);
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="logo">
      <span class="logo-icon">A</span>
      Alpha Lansing
    </a>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist. Head back to the homepage to learn about bringing Alpha School to Lansing.</p>
    <a href="/" class="btn">Back to Home</a>
  </div>
</body>
</html>
